<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kactuif 地震シミュレーター Pro</title>
    <style>
        :root { --accent: #3b82f6; --bg: #0f172a; --panel: #1e293b; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: #f1f5f9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--panel); padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #60a5fa; margin-bottom: 25px; font-size: 1.4em; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #334155; border-radius: 10px; background: rgba(0,0,0,0.3); }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #94a3b8; font-size: 0.9em; }
        textarea, select, input { width: 100%; padding: 12px; border: 1px solid #475569; border-radius: 8px; background: #0f172a; color: white; box-sizing: border-box; }
        
        .btn-group { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px; }
        button { cursor: pointer; border: none; border-radius: 8px; padding: 12px; font-weight: bold; transition: 0.2s; }
        .btn-ai { background: #8b5cf6; color: white; }
        .btn-ai:hover { background: #7c3aed; }
        .btn-record { background: #ef4444; color: white; font-size: 1.2em; margin-top: 15px; width: 100%; }
        .btn-record:disabled { background: #64748b; cursor: not-allowed; }
        
        .preset-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .btn-preset { background: #334155; color: #cbd5e1; font-size: 0.8em; padding: 6px 12px; }

        #canvas-container { margin-top: 20px; background: #000; border-radius: 12px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; min-height: 300px; border: 2px solid #334155; }
        canvas { max-width: 100%; height: auto; display: none; }
        .status-badge { position: absolute; top: 15px; left: 15px; background: rgba(239, 68, 68, 0.8); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8em; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Kactuif 地震シミュレーター Pro</h1>

    <div class="section">
        <label>① 画像をセット</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="section">
        <label>② 揺れの内容（AIまたはプリセット）</label>
        <textarea id="aiInput" rows="3" placeholder="例：東日本大震災のような、最初はカタカタ揺れてから2分以上続く巨大な横揺れ"></textarea>
        <div class="btn-group">
            <button class="btn-ai" id="aiBtn">AI解析を実行</button>
        </div>
        <div class="preset-container">
            <button class="btn-preset" onclick="setPreset('east_japan')">東日本大震災</button>
            <button class="btn-preset" onclick="setPreset('hanshin')">阪神淡路大震災</button>
            <button class="btn-preset" onclick="setPreset('nankai')">南海トラフ(想定)</button>
        </div>
    </div>

    <div class="section" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div>
            <label>時間(秒)</label>
            <input type="number" id="duration" value="10">
        </div>
        <div>
            <label>揺れの種類</label>
            <select id="shakeType">
                <option value="all">全方向</option>
                <option value="horizontal">横揺れ中心</option>
                <option value="vertical">縦揺れ中心</option>
            </select>
        </div>
    </div>

    <button class="btn-record" id="recordBtn">動画を生成して保存</button>
    
    <div id="canvas-container">
        <div class="status-badge" id="recBadge">● RECORDING</div>
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script type="importmap">
  { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const MY_API_KEY = "AIzaSyCODu24nOZF5DUpvtODlkAw245iUpzBP5k";
    
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const imageInput = document.getElementById('imageInput');
    const recordBtn = document.getElementById('recordBtn');
    const aiBtn = document.getElementById('aiBtn');
    const recBadge = document.getElementById('recBadge');

    let img = new Image();
    let isImageLoaded = false;
    let config = { intensity: 20, speed: 0.5 };

    let px = 0, py = 0, vx = 0, vy = 0;

    window.setPreset = (id) => {
        const p = {
            east_japan: { d: 180, i: 28, s: 0.3, t: 'all', txt: "東日本大震災級の巨大地震。ゆっくり大きく長く揺れる。" },
            hanshin: { d: 20, i: 48, s: 0.8, t: 'all', txt: "阪神淡路大震災級の直下型地震。激しい衝撃。" },
            nankai: { d: 150, i: 35, s: 0.4, t: 'horizontal', txt: "南海トラフ想定。強い横揺れが広範囲で続く。" }
        }[id];
        document.getElementById('duration').value = p.d;
        document.getElementById('shakeType').value = p.t;
        document.getElementById('aiInput').value = p.txt;
        config.intensity = p.i; config.speed = p.s;
    };

    imageInput.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            img.onload = () => {
                canvas.width = img.width; canvas.height = img.height;
                canvas.style.display = 'block';
                isImageLoaded = true;
                draw(0, 0, 0);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function draw(ox, oy, bl) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const z = 1.1;
        ctx.filter = `blur(${bl}px)`;
        ctx.drawImage(img, (canvas.width - canvas.width*z)/2 + ox, (canvas.height - canvas.height*z)/2 + oy, canvas.width*z, canvas.height*z);
    }

    aiBtn.onclick = async () => {
        const text = document.getElementById('aiInput').value;
        if (!text) return alert("内容を入力してください");
        
        aiBtn.innerText = "解析中...";
        aiBtn.disabled = true;

        try {
            const genAI = new GoogleGenerativeAI(MY_API_KEY);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            const prompt = `あなたは地震専門家です。要望「${text}」に基づき、以下のJSONのみを出力して。
            {"duration": 秒数(1-300), "type": "all"|"horizontal"|"vertical", "intensity": 揺れ強さ(10-60), "speed": 速さ(0.1-1.0)}`;

            const result = await model.generateContent(prompt);
            const rawText = await result.response.text();
            
            // JSON抽出の超強化版
            let jsonStr = rawText;
            if (rawText.includes('{')) {
                jsonStr = rawText.substring(rawText.indexOf('{'), rawText.lastIndexOf('}') + 1);
            }
            
            const data = JSON.parse(jsonStr);

            document.getElementById('duration').value = data.duration || 30;
            document.getElementById('shakeType').value = data.type || 'all';
            config.intensity = data.intensity || 20;
            config.speed = data.speed || 0.5;

            aiBtn.innerText = "解析完了";
            setTimeout(() => { aiBtn.innerText = "AI解析を実行"; aiBtn.disabled = false; }, 1500);
        } catch (e) {
            console.error("AI Error:", e);
            alert("解析に失敗。APIキーの有効期限、または1日の制限に達していないか確認してください。");
            aiBtn.innerText = "AI解析を実行";
            aiBtn.disabled = false;
        }
    };

    recordBtn.onclick = async () => {
        if (!isImageLoaded) return alert("画像をアップロードしてください");
        recordBtn.disabled = true;
        recBadge.style.display = "block";
        
        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        const chunks = [];
        
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `quake_${Date.now()}.webm`; a.click();
            recBadge.style.display = "none";
            recordBtn.disabled = false;
        };

        const frames = document.getElementById('duration').value * 30;
        const type = document.getElementById('shakeType').value;
        let f = 0;
        
        recorder.start();

        function step() {
            if (f < frames) {
                let ax = (Math.random() - 0.5) * config.intensity * config.speed;
                let ay = (Math.random() - 0.5) * config.intensity * config.speed;
                if (type === 'horizontal') ay *= 0.2;
                if (type === 'vertical') ax *= 0.2;
                vx += ax; vy += ay; vx *= 0.7; vy *= 0.7;
                px += vx; py += vy; px *= 0.85; py *= 0.85;
                draw(px, py, (Math.abs(vx) + Math.abs(vy)) / 3);
                f++; requestAnimationFrame(step);
            } else { recorder.stop(); }
        }
        step();
    };
</script>
</body>
</html>
