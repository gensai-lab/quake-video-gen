<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高度地震シミュレーター Kactuif Edition</title>
    <style>
        :root { --accent: #2563eb; --bg: #0f172a; --panel: #1e293b; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: #f1f5f9; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: var(--panel); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #60a5fa; margin-bottom: 20px; font-size: 1.5em; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #334155; border-radius: 10px; background: rgba(0,0,0,0.2); }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #94a3b8; }
        input[type="password"], textarea, select { width: 100%; padding: 12px; border: 1px solid #475569; border-radius: 8px; background: #0f172a; color: white; box-sizing: border-box; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .preset-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 10px; }
        
        button { cursor: pointer; border: none; border-radius: 8px; padding: 12px; font-weight: bold; transition: 0.2s; }
        .btn-ai { background: #8b5cf6; color: white; width: 100%; }
        .btn-preset { background: #334155; color: #cbd5e1; font-size: 0.85em; }
        .btn-preset:hover { background: #475569; }
        .btn-record { background: #ef4444; color: white; width: 100%; font-size: 1.2em; margin-top: 20px; }
        
        #canvas-container { margin-top: 20px; text-align: center; background: #000; border-radius: 8px; position: relative; min-height: 200px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        canvas { max-width: 100%; height: auto; display: none; }
        .recording-overlay { position: absolute; top: 10px; left: 10px; color: red; font-weight: bold; display: none; align-items: center; }
        .dot { width: 10px; height: 10px; background: red; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="container">
    <h1>高度地震シミュレーター</h1>

    <div class="section">
        <label>Gemini APIキー</label>
        <input type="password" id="apiKey" placeholder="キーを入力（AI機能用）">
    </div>

    <div class="section">
        <label>① 画像アップロード</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="section">
        <label>② 地震シナリオ（AI解析 / プリセット）</label>
        <textarea id="aiInput" rows="2" placeholder="例：3分続く巨大地震、最初はP波でカタカタ揺れてから大揺れが来る"></textarea>
        <button class="btn-ai" id="aiBtn" style="margin-top:10px">AIに設定を読み取らせる</button>
        
        <div class="preset-grid">
            <button class="btn-preset" onclick="setPreset('east_japan')">東日本大震災風</button>
            <button class="btn-preset" onclick="setPreset('hanshin')">阪神淡路大震災風</button>
            <button class="btn-preset" onclick="setPreset('kanto')">関東大震災風</button>
            <button class="btn-preset" onclick="setPreset('nankai')">南海トラフ想定風</button>
        </div>
    </div>

    <div class="section grid">
        <div>
            <label>時間(秒)</label>
            <input type="number" id="duration" value="10">
        </div>
        <div>
            <label>揺れの種類</label>
            <select id="shakeType">
                <option value="all">複合揺れ</option>
                <option value="horizontal">主に横揺れ</option>
                <option value="vertical">主に縦揺れ</option>
            </select>
        </div>
    </div>

    <button class="btn-record" id="recordBtn">録画開始・ダウンロード</button>
    
    <div id="canvas-container">
        <div class="recording-overlay" id="recBadge"><span class="dot"></span>REC</div>
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script type="importmap">
  { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const imageInput = document.getElementById('imageInput');
    const recordBtn = document.getElementById('recordBtn');
    const aiBtn = document.getElementById('aiBtn');
    const recBadge = document.getElementById('recBadge');

    let img = new Image();
    let isImageLoaded = false;
    
    // 物理エンジン用変数
    let posX = 0, posY = 0;
    let velX = 0, velY = 0;
    let config = { duration: 10, intensity: 20, speed: 0.5, type: 'all' };

    // プリセットデータ
    const presets = {
        east_japan: { duration: 180, intensity: 25, speed: 0.3, type: 'all', desc: "長時間続く、ゆっくりとした大きな揺れ" },
        hanshin: { duration: 20, intensity: 45, speed: 0.8, type: 'all', desc: "直下型の激しい突き上げと横揺れ" },
        kanto: { duration: 60, intensity: 35, speed: 0.4, type: 'horizontal', desc: "非常に強い横揺れが長く続く" },
        nankai: { duration: 150, intensity: 30, speed: 0.35, type: 'all', desc: "広域で続く巨大な揺れ" }
    };

    window.setPreset = (id) => {
        const p = presets[id];
        document.getElementById('duration').value = p.duration;
        document.getElementById('shakeType').value = p.type;
        document.getElementById('aiInput').value = p.desc;
        config.intensity = p.intensity;
        config.speed = p.speed;
        alert(`${id} プリセットを読み込みました。`);
    };

    imageInput.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                canvas.style.display = 'block';
                isImageLoaded = true;
                draw(0, 0, 0);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function draw(ox, oy, blur) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const zoom = 1.08; // 揺れ幅確保のため少し大きめにズーム
        const w = canvas.width * zoom;
        const h = canvas.height * zoom;
        ctx.filter = `blur(${blur}px)`;
        ctx.drawImage(img, (canvas.width - w)/2 + ox, (canvas.height - h)/2 + oy, w, h);
    }

    aiBtn.onclick = async () => {
        // キーが入力されていない場合は、あなたが教えてくれたキーをデフォルトで使うように設定できます
        const key = document.getElementById('apiKey').value || "AIzaSyCODu24nOZF5DUpvtODlkAw245iUpzBP5k";
        const text = document.getElementById('aiInput').value;
        if (!text) return alert("要望を入力してください");
        
        aiBtn.innerText = "解析中...";
        try {
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            const prompt = `あなたは地震専門家です。以下の要望から動画設定を抽出し、必ずJSON形式のみで回答してください。
            要望:「${text}」
            出力例: {"duration":30, "type":"all", "intensity":25, "speed":0.5}`;
            
            const result = await model.generateContent(prompt);
            const responseText = result.response.text();
            
            // JSONの部分だけを正規表現で無理やり抽出する（これで失敗が減ります）
            const jsonMatch = responseText.match(/\{.*\}/s);
            if (!jsonMatch) throw new Error("JSONが見つかりませんでした");
            
            const json = JSON.parse(jsonMatch[0]);
            
            document.getElementById('duration').value = json.duration || 10;
            document.getElementById('shakeType').value = json.type || 'all';
            config.intensity = json.intensity || 20;
            config.speed = json.speed || 0.5;
            
            aiBtn.innerText = "AI設定完了！";
        } catch (e) { 
            console.error(e);
            alert("AI解析に失敗しました。APIキーが正しいか、または通信環境を確認してください。"); 
            aiBtn.innerText = "AIに設定を読み取らせる"; 
        }
    };

    recordBtn.onclick = async () => {
        if (!isImageLoaded) return alert("画像を先にアップしてください");
        
        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        const chunks = [];
        
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `quake_sim_${Date.now()}.webm`;
            a.click();
            recBadge.style.display = "none";
            recordBtn.disabled = false;
        };

        const totalFrames = document.getElementById('duration').value * 30;
        let currentFrame = 0;
        const type = document.getElementById('shakeType').value;

        recorder.start();
        recBadge.style.display = "flex";
        recordBtn.disabled = true;

        function updatePhysics() {
            if (currentFrame < totalFrames) {
                // 地震波のシミュレーション（ランダムな加速度）
                let accX = (Math.random() - 0.5) * config.intensity * config.speed;
                let accY = (Math.random() - 0.5) * config.intensity * config.speed;

                if (type === 'horizontal') accY *= 0.2;
                if (type === 'vertical') accX *= 0.2;

                velX += accX; velY += accY;
                velX *= 0.8; velY *= 0.8; // 摩擦（減衰）
                posX += velX; posY += velY;
                
                // 中心に戻ろうとする復元力
                posX *= 0.9; posY *= 0.9;

                const blur = (Math.abs(velX) + Math.abs(velY)) / 4;
                draw(posX, posY, blur);
                
                currentFrame++;
                requestAnimationFrame(updatePhysics);
            } else {
                recorder.stop();
            }
        }
        updatePhysics();
    };
</script>
</body>
</html>
